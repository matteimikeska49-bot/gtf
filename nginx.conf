server {
    listen 80;
    server_name _;

    # Redirect /index and /index/ to /
    rewrite ^/index/?$ / permanent;

    # Normalize multiple slashes in the URL (client-side redirect)
    if ($request_uri ~ "^[^?]*?//") {
        rewrite ^(.*)$ $1 permanent;
    }

    # Redirect trailing slashes (except root) to non-trailing slash
    rewrite ^/(.*)/$ /$1 permanent;

    root /usr/share/nginx/html;
    index index.html;

    # Default: do not cache HTML or APIs long-term, must revalidate
    add_header Cache-Control "public, max-age=0, must-revalidate";

    # Set default charset
    charset utf-8;
    charset_types text/plain text/css application/javascript application/json application/xml text/xml;

    # Serve pre-rendered static HTML per route first.
    # If not found, return 404 status but serve the SPA index.html
    # so React can visually render the NotFoundPage component.
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    error_page 404 /index.html;

    # Hashed assets from Vite (safe for immutable cache)
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static unhashed images and media (shorter cache, must revalidate if changed)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|webmanifest|mp4)$ {
        add_header Cache-Control "public, max-age=86400, must-revalidate";
    }

    # Ensure correct Content-Type for HTML files
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Ensure explicit UTF-8 for text files like robots.txt and llms.txt
    location ~* \.txt$ {
        charset utf-8;
        default_type text/plain;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
}
